# Development: Database services only
# Run with: docker compose -f docker-compose.dev.yml up -d
# Then: cd backend && npm run dev

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: aipulse-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aipulse
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aipulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: aipulse-redis-dev
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  timescale_data:
  redis_data:
