version: '3.8'

services:
  aipulse:
    build: .
    container_name: aipulse
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - CACHE_TTL_SECONDS=60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
